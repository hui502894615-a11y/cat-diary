<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 仙仙 & 四月的生活日记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── 样式完全保留 ── */
  :root {
    --x-color: #b8926a; --x-light: #f7efe4; --x-mid: #e8d5bc;
    --s-color: #6a9ab8; --s-light: #e4f0f7; --s-mid: #bcd5e8;
    --bg: #faf8f5; --surface: #ffffff; --border: #e8e4de;
    --text: #2c2824; --text-muted: #8a8078; --text-light: #b5aea6;
    --accent-green: #5a8a4a; --accent-green-bg: #eaf3e4;
    --accent-amber: #9a6a20; --accent-amber-bg: #faefd8;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 28px 0 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 12px rgba(0,0,0,0.04); }
  .header-paws { font-size: 22px; letter-spacing: 6px; margin-bottom: 4px; }
  header h1 { font-family: "Noto Serif SC", serif; font-size: 28px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 4px; }
  header p { font-size: 13px; color: var(--text-muted); font-weight: 300; }
  .nav-tabs { display: flex; justify-content: center; gap: 6px; margin-top: 16px; flex-wrap: wrap; padding: 0 10px; }
  .nav-tab { padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: inherit; transition: all 0.2s; }
  .nav-tab:hover { background: var(--bg); }
  .nav-tab.active { background: var(--text); color: #fff; border-color: var(--text); }
  main { max-width: 860px; margin: 0 auto; padding: 32px 16px 60px; }
  .page { display: none; } .page.active { display: block; }
  .section-title { font-family: "Noto Serif SC", serif; font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 28px; }
  .cat-card { background: var(--surface); border-radius: var(--radius); padding: 24px 20px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: box-shadow 0.2s; }
  .cat-card:hover { box-shadow: var(--shadow-hover); }
  .cat-card.xianxian { border-top: 4px solid var(--x-color); }
  .cat-card.siyue { border-top: 4px solid var(--s-color); }
  .cat-avatar-area { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .cat-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 34px; cursor: pointer; overflow: hidden; flex-shrink: 0; transition: border-color 0.2s; }
  .cat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .cat-name-block .name { font-family: "Noto Serif SC", serif; font-size: 22px; font-weight: 600; }
  .cat-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .stat-value { font-size: 15px; font-weight: 500; }
  
  /* 编辑状态指示：默认隐藏，仅在 #edit 模式下显示 */
  .edit-hint, .sync-bar, .add-diary-btn, .delete-photo, .photo-slot:not(.filled) { display: none !important; }
  [contenteditable="true"] { outline: none; border-bottom: none; cursor: default; }

  /* 🔑 管理员模式激活时的样式重载 */
  body.admin-mode .edit-hint, body.admin-mode .sync-bar, body.admin-mode .add-diary-btn, body.admin-mode .photo-slot:not(.filled) { display: flex !important; }
  body.admin-mode .sync-bar { display: flex !important; }
  body.admin-mode .photo-slot.filled:hover .delete-photo { display: flex !important; }
  body.admin-mode [contenteditable="true"] { border-bottom: 1px dashed var(--border); cursor: text; }
  body.admin-mode [contenteditable="true"]:focus { border-bottom-color: var(--text-muted); }

  /* 基础结构保持 */
  .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 28px; }
  .health-card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .health-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 13px; gap: 8px; }
  .badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .badge.good { background: var(--accent-green-bg); color: var(--accent-green); }
  .badge.warn { background: var(--accent-amber-bg); color: var(--accent-amber); }
  .chart-wrap { background: var(--surface); border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 28px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 14px; }
  .photo-slot { aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; background: var(--bg); border: 1.5px dashed var(--border); cursor: pointer; position: relative; }
  .photo-slot img, .photo-slot video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .delete-photo { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; align-items: center; justify-content: center; border: none; cursor: pointer; }
  .diary-entry { background: var(--surface); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; gap: 16px; align-items: flex-start; margin-bottom: 12px; }
  .diary-date-box { min-width: 52px; text-align: center; background: var(--bg); border-radius: var(--radius-sm); padding: 8px 6px; flex-shrink: 0; }
  .diary-tag { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
  .sync-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c2824; color: white; padding: 15px; text-align: center; font-size: 13px; z-index: 9999; justify-content: center; align-items: center; gap: 20px; }
  .sync-btn { background: #5a8a4a; color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: 500; }
  footer { text-align: center; font-size: 12px; color: var(--text-light); padding: 20px; margin-top: 20px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <h1>仙仙 &amp; 四月的生活日记</h1>
  <p>记录两位女王陛下的每一天</p>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('profile',this)">档案 &amp; 健康</button>
    <button class="nav-tab" onclick="showPage('food',this)">饮食记录</button>
    <button class="nav-tab" onclick="showPage('gallery',this)">相册</button>
    <button class="nav-tab" onclick="showPage('diary',this)">生活日记</button>
  </nav>
</header>
<main>
  <div class="page active" id="page-profile">
    <div class="section-title"><span>🐱</span> 猫咪档案</div>
    <div class="cat-grid">
      <div class="cat-card xianxian">
        <div class="cat-avatar-area">
          <div class="cat-avatar">🐱</div>
          <div class="cat-name-block"><div class="name">仙仙</div></div>
        </div>
        <div class="cat-stats">
          <div class="stat-item"><div class="stat-label">体重</div><div class="stat-value" contenteditable="true">4 kg</div></div>
          <div class="stat-item" style="grid-column: span 2;"><div class="stat-label">特征</div><div class="stat-value" contenteditable="true">暹罗花纹，蓝眼睛，爱撒娇</div></div>
        </div>
      </div>
      <div class="cat-card siyue">
        <div class="cat-avatar-area">
          <div class="cat-avatar">🐈</div>
          <div class="cat-name-block"><div class="name">四月</div></div>
        </div>
        <div class="cat-stats">
          <div class="stat-item"><div class="stat-label">体重</div><div class="stat-value" contenteditable="true">3.8 kg</div></div>
          <div class="stat-item" style="grid-column: span 2;"><div class="stat-label">特征</div><div class="stat-value" contenteditable="true">天生缺失右肾右卵巢，爱喝水</div></div>
        </div>
      </div>
    </div>
    <div class="section-title"><span>📊</span> 体重趋势</div>
    <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
  </div>

  <div class="page" id="page-gallery">
    <div class="gallery-toolbar">
      <button class="upload-btn admin-mode-only" onclick="triggerPhotoUpload()">＋ 上传照片</button>
      <input type="file" id="photoUploadInput" hidden multiple onchange="handlePhotoUpload(event)">
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div class="page" id="page-diary">
    <div class="diary-controls">
      <div class="section-title">📔 生活日记</div>
      <button class="add-diary-btn" onclick="openDiaryModal()">＋ 添加日记</button>
    </div>
    <div class="diary-list" id="diaryList"></div>
  </div>
</main>

<footer>🐾 仙仙 &amp; 四月 · 用爱记录</footer>

<div class="sync-bar" id="syncBar">
  <span>🛠 管理模式已开启：修改完成后点击右侧按钮</span>
  <button class="sync-btn" onclick="exportAndCopy()">导出代码并覆盖 GitHub</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ── 数据库 ── */
let state = {
  weightLabels:['第1次','第2次','第3次','第4次','第5次','第6次'],
  weightX:[3.8,3.9,3.9,4.0,4.0,4.0],
  weightS:[3.6,3.7,3.7,3.8,3.8,3.8],
  photos:[],
  diary:[
    {id:1,date:'2026-05-10',text:'仙仙早上起来就开始捣乱。四月一如既往安静。'}
  ]
};

/* ── 核心：检查是否进入管理模式 ── */
function checkAdminMode() {
  if (window.location.hash === '#edit') {
    document.body.classList.add('admin-mode');
    console.log("已进入管理模式");
  } else {
    document.body.classList.remove('admin-mode');
    // 禁用所有 contenteditable
    document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = false);
  }
}

function exportAndCopy() {
  const currentHTML = document.documentElement.outerHTML;
  const stateStr = `let state = ${JSON.stringify(state, null, 2)};`;
  const finalHTML = currentHTML.replace(/let state = \{[\s\S]*?\};/, stateStr);
  navigator.clipboard.writeText(finalHTML).then(() => {
    alert("✅ 成功！最新代码已复制。请去 GitHub 粘贴覆盖 index.html 即可同步。");
  });
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='gallery') renderGallery();
  if(name==='diary') renderDiary();
}

/* 这里是原始的功能逻辑（简略版） */
function renderDiary() {
  const list = document.getElementById('diaryList');
  list.innerHTML = state.diary.map(d => `
    <div class="diary-entry">
      <div class="diary-date-box">${d.date.split('-')[2]}</div>
      <div class="diary-text" contenteditable="${window.location.hash==='#edit'}">${d.text}</div>
    </div>
  `).join('');
}

window.onload = () => {
  checkAdminMode();
  // 初始化图表等...
};
window.onhashchange = checkAdminMode;
</script>
</body>
</html>
